<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dragon.io - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }
    
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-card: #1a1a1a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
      --glow-purple: rgba(139, 92, 246, 0.4);
      --apple-blue: #007AFF;
      --google-red: #EA4335;
      --phone-green: #34C759;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      overflow: hidden;
    }
    
    /* Animated background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }
    
    .bg-animation::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
      animation: rotate 30s linear infinite;
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      animation: fadeIn 0.6s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .logo {
      text-align: center;
      margin-bottom: 3rem;
    }
    
    .logo h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    
    .logo .tagline {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    
    /* Social Login Buttons */
    .social-login {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 1rem 1.5rem;
      border-radius: 14px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      color: white;
      position: relative;
      overflow: hidden;
    }
    
    .social-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .social-btn:hover::before {
      left: 100%;
    }
    
    .social-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .social-btn:active {
      transform: translateY(0);
    }
    
    .social-btn svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }
    
    .apple-btn {
      background: white;
      color: black;
    }
    
    .apple-btn:hover {
      box-shadow: 0 10px 30px rgba(255,255,255,0.2);
    }
    
    .google-btn {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
    }
    
    .google-btn:hover {
      border-color: var(--google-red);
      box-shadow: 0 10px 30px rgba(234, 67, 53, 0.2);
    }
    
    .phone-btn {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
    }
    
    .phone-btn:hover {
      border-color: var(--phone-green);
      box-shadow: 0 10px 30px rgba(52, 199, 89, 0.2);
    }
    
    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    
    /* Guest Login */
    .guest-section {
      text-align: center;
    }
    
    .guest-input {
      width: 100%;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      border: 2px solid var(--bg-card);
      border-radius: 14px;
      background: var(--bg-card);
      color: var(--text-primary);
      text-align: center;
      outline: none;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
    }
    
    .guest-input:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 20px var(--glow-purple);
    }
    
    .guest-input::placeholder {
      color: var(--text-secondary);
    }
    
    .play-btn {
      width: 100%;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      background: var(--accent-gradient);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .play-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 40px var(--glow-purple);
    }
    
    .play-btn:active {
      transform: scale(0.98);
    }
    
    /* Phone Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: var(--bg-secondary);
      padding: 2rem;
      border-radius: 20px;
      width: 90%;
      max-width: 360px;
      border: 1px solid rgba(255,255,255,0.1);
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .modal h3 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    
    .modal input {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      border: 2px solid var(--bg-card);
      border-radius: 12px;
      background: var(--bg-card);
      color: white;
      margin-bottom: 1rem;
      outline: none;
    }
    
    .modal input:focus {
      border-color: var(--phone-green);
    }
    
    .modal-buttons {
      display: flex;
      gap: 1rem;
    }
    
    .modal-btn {
      flex: 1;
      padding: 1rem;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .modal-btn.cancel {
      background: var(--bg-card);
      color: white;
    }
    
    .modal-btn.confirm {
      background: var(--phone-green);
      color: white;
    }
    
    .modal-btn:hover {
      transform: translateY(-2px);
    }
    
    /* Coming Soon Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      padding: 1rem 2rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 2000;
    }
    
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    
    /* Responsive */
    @media (max-width: 480px) {
      .login-container {
        padding: 1.5rem;
      }
      
      .logo h1 {
        font-size: 2.5rem;
      }
      
      .social-btn {
        padding: 0.875rem 1.25rem;
        font-size: 0.9375rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  
  <div class="login-container">
    <div class="logo">
      <h1>🐲 Dragon.io</h1>
      <div class="tagline">Eat. Grow. Dominate.</div>
    </div>
    
    <div class="social-login">
      <button class="social-btn apple-btn" onclick="loginWithApple()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        Continue with Apple
      </button>
      
      <button class="social-btn google-btn" onclick="loginWithGoogle()">
        <svg viewBox="0 0 24 24">
          <path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#4285F4" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#34A853" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      
      <button class="social-btn phone-btn" onclick="showPhoneModal()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
        </svg>
        Continue with Phone
      </button>
    </div>
    
    <div class="divider">or</div>
    
    <div class="guest-section">
      <input type="text" class="guest-input" id="guestName" placeholder="Enter your nickname" maxlength="15">
      <button class="play-btn" onclick="playAsGuest()">PLAY AS GUEST</button>
    </div>
  </div>
  
  <!-- Phone Modal -->
  <div class="modal-overlay" id="phoneModal">
    <div class="modal">
      <h3>📱 Enter Phone Number</h3>
      <input type="tel" id="phoneInput" placeholder="+33 6 12 34 56 78" maxlength="20">
      <div class="modal-buttons">
        <button class="modal-btn cancel" onclick="hidePhoneModal()">Cancel</button>
        <button class="modal-btn confirm" onclick="loginWithPhone()">Send Code</button>
      </div>
    </div>
  </div>
  
  <!-- Toast -->
  <div class="toast" id="toast">Coming soon!</div>

  <script>
    // Check for saved name
    const savedName = localStorage.getItem('dragonio_name');
    if (savedName) {
      document.getElementById('guestName').value = savedName;
    }
    
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
    
    function loginWithApple() {
      // Apple Sign In - requires Apple Developer account
      showToast('Apple Sign In - Coming soon!');
      console.log('Apple login requested');
    }
    
    function loginWithGoogle() {
      // Google OAuth - requires Google Cloud setup
      showToast('Google Sign In - Coming soon!');
      console.log('Google login requested');
    }
    
    function showPhoneModal() {
      document.getElementById('phoneModal').classList.add('active');
      document.getElementById('phoneInput').focus();
    }
    
    function hidePhoneModal() {
      document.getElementById('phoneModal').classList.remove('active');
    }
    
    function loginWithPhone() {
      const phone = document.getElementById('phoneInput').value.trim();
      if (!phone) {
        showToast('Please enter a phone number');
        return;
      }
      // SMS verification - requires Twilio/similar service
      showToast('SMS verification - Coming soon!');
      hidePhoneModal();
      console.log('Phone login:', phone);
    }
    
    function playAsGuest() {
      const name = document.getElementById('guestName').value.trim() || 'Dragon' + Math.floor(Math.random() * 1000);
      localStorage.setItem('dragonio_name', name);
      
      // Redirect to game with auto-start
      window.location.href = '/game.html?name=' + encodeURIComponent(name) + '&autostart=1';
    }
    
    // Enter key support
    document.getElementById('guestName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') playAsGuest();
    });
    
    document.getElementById('phoneInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginWithPhone();
    });
    
    // Close modal on overlay click
    document.getElementById('phoneModal').addEventListener('click', (e) => {
      if (e.target.id === 'phoneModal') hidePhoneModal();
    });
  </script>
</body>
</html>
